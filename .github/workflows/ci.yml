name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:

permissions:
  contents: read

jobs:
  lean_toolchains:
    name: Resolve Lean/Lake toolchains
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve latest stable Lean releases
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: 'leanprover',
              repo: 'lean4',
              per_page: 100,
            });

            function parseStableTag(tag) {
              const match = /^v(\d+)\.(\d+)\.(\d+)$/.exec(tag);
              return match ? match.slice(1).map(Number) : null;
            }

            function compareStableTagsDesc(a, b) {
              const aParts = parseStableTag(a);
              const bParts = parseStableTag(b);
              for (let i = 0; i < 3; i += 1) {
                if (aParts[i] !== bParts[i]) {
                  return bParts[i] - aParts[i];
                }
              }
              return 0;
            }

            const stableTags = [...new Set(
              releases
                .filter((release) => !release.draft && !release.prerelease)
                .map((release) => release.tag_name)
                .filter((tag) => parseStableTag(tag) !== null)
            )].sort(compareStableTagsDesc);

            if (stableTags.length < 2) {
              throw new Error(`Expected at least two stable Lean releases, got ${stableTags.length}`);
            }

            const matrix = {
              include: [
                {
                  lane: 'latest-stable',
                  lean_version: stableTags[0],
                  toolchain: `leanprover/lean4:${stableTags[0]}`,
                },
                {
                  lane: 'previous-stable',
                  lean_version: stableTags[1],
                  toolchain: `leanprover/lean4:${stableTags[1]}`,
                },
              ],
            };

            core.info(`Resolved Lean/Lake toolchains: ${stableTags[0]}, ${stableTags[1]}`);
            core.setOutput('matrix', JSON.stringify(matrix));

  build-test:
    name: Build and test (${{ matrix.lane }} ${{ matrix.lean_version }})
    needs: lean_toolchains
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.lean_toolchains.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Forbid implemented_by on main
        if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
        run: ./scripts/check-no-implemented-by-on-main.sh

      - name: Install elan
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Select Lean/Lake toolchain
        run: |
          export LEAN_VERSION="${{ matrix.lean_version }}"
          printf '%s\n' "${{ matrix.toolchain }}" > lean-toolchain
          perl -0pi -e 's/(name = "mathlib"\nscope = "leanprover-community"\nrev = ")[^"]+(")/$1$ENV{LEAN_VERSION}$2/' lakefile.toml
          grep -A2 'name = "mathlib"' lakefile.toml | grep "rev = \"${LEAN_VERSION}\""

      - name: Cache Lean + Lake
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: ${{ runner.os }}-lake-${{ matrix.lean_version }}-${{ hashFiles('lean-toolchain', 'lakefile.toml', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-${{ matrix.lean_version }}-

      - name: Install selected Lean/Lake
        run: |
          elan toolchain install "${{ matrix.toolchain }}"
          lean --version
          lake --version

      - name: Update dependencies
        run: lake update

      - name: Download mathlib cache
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: Test
        run: lake test
